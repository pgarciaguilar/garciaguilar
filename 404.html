<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — garciaguilar.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #888;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.75rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      background: var(--accent);
      color: #0f0f0f;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #fff;
      transform: translateY(-1px);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: block;
      margin-bottom: 4rem;
    }
    .nav-logo span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="nav-logo">PGA<span>.</span></a>
    <div class="error-code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o ha sido movida. Vuelve al inicio para ver el perfil completo.</p>
    <a href="/" class="btn">← Volver al inicio</a>
  </div>
</body>
</html>
